  <!-- Apply saved/preferred theme synchronously before paint, so the loader
       picks up the correct background via CSS vars and there is no flash. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t !== 'dark' && t !== 'light') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>

  <!-- Inline page loader: shown until React replaces #root content -->
  <style>
    .page-loader {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 9px;
      background: var(--bg, #fbfbfa);
      z-index: 100;
    }
    html[data-theme="dark"] .page-loader { background: var(--bg, #0e0f11); }
    .page-loader .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent, #3b73d4);
      animation: page-loader-pulse 1.2s ease-in-out infinite;
    }
    .page-loader .dot:nth-child(2) { animation-delay: .15s; }
    .page-loader .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes page-loader-pulse {
      0%, 80%, 100% { opacity: .2; transform: scale(.7); }
      40%           { opacity:  1; transform: scale(1);  }
    }
  </style>
